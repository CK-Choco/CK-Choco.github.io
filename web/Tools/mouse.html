<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>滑鼠效能測試器</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --mouse-body: #334155;
            --active-color: #57ec9d;
            --border-color: #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .container { 
            background: white; padding: 30px; border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 1000px;
        }

        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; text-align: center; }
        .stat-label { font-size: 12px; color: #64748b; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 22px; font-weight: 800; font-family: monospace; color: #1e293b; }

        /* 滑鼠視覺 */
        .mouse-container { position: relative; width: 180px; height: 260px; margin: 0 auto 30px; }
        .mouse-body { 
            width: 100%; height: 100%; border: 4px solid var(--mouse-body); 
            border-radius: 60px 60px 80px 80px; background: #fff; position: relative; 
        }

        .m-btn { position: absolute; top: 0; height: 110px; width: 50%; border-bottom: 4px solid var(--mouse-body); transition: 0.1s; }
        #btn-0 { left: 0; border-right: 2px solid var(--mouse-body); border-radius: 55px 0 0 0; }
        #btn-2 { right: 0; border-left: 2px solid var(--mouse-body); border-radius: 0 55px 0 0; }
        #btn-1 { left: 50%; top: 30px; transform: translateX(-50%); width: 24px; height: 50px; background: var(--mouse-body); border-radius: 12px; z-index: 10; }

        /* 側鍵 */
        .side-btn {
            position: absolute; left: -12px; width: 12px; height: 45px; 
            background: #94a3b8; border: 2px solid var(--mouse-body); transition: 0.1s;
        }
        #btn-4 { top: 100px; border-radius: 6px 0 0 6px; } /* 側上鍵 */
        #btn-3 { top: 155px; border-radius: 6px 0 0 6px; } /* 側下鍵 */

        .active { background: var(--active-color) !important; box-shadow: 0 0 15px var(--active-color); }

        .track-area { width: 100%; height: 350px; border: 2px solid var(--border-color); border-radius: 12px; background: #fff; cursor: crosshair; }
        #canvas { width: 100%; height: 100%; }
        .controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 6px; border: 1px solid #ccc; background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; margin-bottom: 25px;">滑鼠效能測試器 (精簡版)</h2>

    <div class="dashboard">
        <div class="stat-card"><span class="stat-label">最後按鍵</span><span id="last-btn" class="stat-value">-</span></div>
        <div class="stat-card"><span class="stat-label">雙擊間隔 (ms)</span><span id="db-speed" class="stat-value">0</span></div>
        <div class="stat-card"><span class="stat-label">滾輪方向與數值</span><span id="wheel-delta" class="stat-value">0.0</span></div>
        <div class="stat-card"><span class="stat-label">座標</span><span id="coords" class="stat-value">0, 0</span></div>
    </div>

    <div class="mouse-container">
        <div class="mouse-body">
            <div id="btn-0" class="m-btn"></div>
            <div id="btn-1" class="m-btn"></div>
            <div id="btn-2" class="m-btn"></div>
        </div>
        <div id="btn-4" class="side-btn"></div> <div id="btn-3" class="side-btn"></div> </div>

    <div class="track-area"><canvas id="canvas"></canvas></div>

    <div class="controls">
        <button onclick="clearCanvas()">清除軌跡</button>
        <button onclick="resetStats()">重置數據</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const lastBtnEl = document.getElementById('last-btn');
    const dbSpeedEl = document.getElementById('db-speed');
    const wheelEl = document.getElementById('wheel-delta');
    const coordsEl = document.getElementById('coords');

    let lastClickTime = 0;
    const mouseMap = { 0: '左鍵', 1: '中鍵', 2: '右鍵', 3: '側下鍵', 4: '側上鍵' };

    function initCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    // 按鍵點擊
    window.addEventListener('mousedown', (e) => {
        if ([1, 2, 3, 4].includes(e.button)) e.preventDefault();
        const btn = document.getElementById(`btn-${e.button}`);
        if (btn) btn.classList.add('active');
        lastBtnEl.textContent = mouseMap[e.button] || `鍵:${e.button}`;

        const now = performance.now();
        if (lastClickTime !== 0) {
            dbSpeedEl.textContent = (now - lastClickTime).toFixed(0);
        }
        lastClickTime = now;
    });

    window.addEventListener('mouseup', (e) => {
        const btn = document.getElementById(`btn-${e.button}`);
        if (btn) btn.classList.remove('active');
    });

    window.addEventListener('contextmenu', e => e.preventDefault());

    // 滾輪邏輯修正
    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        
        // 往前滾 e.deltaY 為負數 -> 往上
        // 往後滾 e.deltaY 為正數 -> 往下
        const direction = e.deltaY < 0 ? "往上" : "往下";
        const preciseValue = e.deltaY.toFixed(1);
        
        wheelEl.textContent = `${direction} (${preciseValue})`;

        const wheelObj = document.getElementById('btn-1');
        wheelObj.classList.add('active');
        clearTimeout(window.wTimer);
        window.wTimer = setTimeout(() => wheelObj.classList.remove('active'), 60);
    }, { passive: false });

    // 軌跡
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        coordsEl.textContent = `${Math.round(x)}, ${Math.round(y)}`;
        ctx.fillStyle = '#3b82f6';
        ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI * 2); ctx.fill();
    });

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function resetStats() {
        lastBtnEl.textContent = "-";
        dbSpeedEl.textContent = "0";
        wheelEl.textContent = "0.0";
        clearCanvas();
    }
</script>
</body>
</html>
