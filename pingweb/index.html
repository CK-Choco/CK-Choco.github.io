<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16-Node Network Monitor (Hidden Access)</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --border: #30363d;
            --red: #f85149;
            --green: #3fb950;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin-bottom: 10px; }
        #status-msg { font-size: 12px; color: #8b949e; margin-bottom: 10px; }

        /* 輸入框與控制區 */
        .controls { 
            margin-bottom: 20px; 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .secret-input {
            background: #21262d;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            outline: none;
            width: 120px;
            font-family: monospace;
        }
        .secret-input:focus { border-color: var(--accent); }

        .btn-group { display: flex; gap: 8px; }
        .btn-switch {
            background-color: #21262d; border: 1px solid var(--border);
            color: #8b949e; padding: 8px 15px; border-radius: 6px;
            cursor: pointer; font-size: 13px;
        }
        .btn-switch.active { border-color: var(--accent); color: var(--accent); }

        /* RWD 網格 */
        .grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 12px; width: 100%; max-width: 1200px; 
        }
        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

        .card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 15px; border-radius: 8px; 
        }
        .nickname { color: #fff; font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ip-addr { color: var(--accent); font-size: 0.85em; font-family: monospace; margin-bottom: 10px; display: block; border-bottom: 1px solid var(--border); padding-bottom: 5px;}
        .stat { display: flex; justify-content: space-between; font-size: 0.9em; margin: 4px 0; }
        .val { color: #fff; font-family: monospace; }
        .alert { color: var(--red) !important; font-weight: bold; }
        .stable { color: var(--green); }
    </style>
</head>
<body>

    <div class="header">
        <h2>網路節點監控系統</h2>
        <div id="status-msg">正在載入數據...</div>
    </div>

    <div class="controls">
        <input type="password" id="pass-code" class="secret-input" placeholder="ACCESS CODE" maxlength="4">
        
        <div class="btn-group">
            <button id="btn-1" class="btn-switch active" onclick="changeSource('iplist.csv', this)">iplist.csv</button>
            <button id="btn-2" class="btn-switch" onclick="changeSource('iplist2.csv', this)">iplist2.csv</button>
        </div>
    </div>

    <div class="grid" id="main-grid"></div>

    <script>
        let currentRawData = ""; // 儲存當前 CSV 內容
        let currentLimit = 14;   // 預設限制數量
        let intervals = [];
        let currentFileName = 'iplist.csv';

        window.onload = () => {
            fetchCsv(currentFileName);
        };

        // 監聽密碼輸入框
        document.getElementById('pass-code').addEventListener('input', function(e) {
            if (e.target.value === "0909") {
                currentLimit = 16;
                document.getElementById('status-msg').innerText = "權限已解鎖：顯示 16 個節點";
                e.target.style.borderColor = "var(--green)";
            } else {
                currentLimit = 14;
                e.target.style.borderColor = "var(--border)";
            }
            // 只要輸入改變就重新解析當前數據
            if (currentRawData) parseAndStart(currentRawData);
        });

        function changeSource(name, btn) {
            currentFileName = name;
            document.querySelectorAll('.btn-switch').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchCsv(name);
        }

        async function fetchCsv(url) {
            try {
                const res = await fetch(url);
                const text = await res.text();
                currentRawData = text; // 存起來供解鎖時切換
                document.getElementById('status-msg').innerText = `目前讀取: ${url} (顯示前 ${currentLimit} 筆)`;
                parseAndStart(text);
            } catch (err) {
                document.getElementById('status-msg').innerText = "讀取 CSV 失敗";
            }
        }

        function parseAndStart(csvText) {
            intervals.forEach(clearInterval);
            intervals = [];

            const lines = csvText.split('\n');
            const nodes = lines.slice(1)
                .map(line => line.split(','))
                .filter(parts => parts.length >= 1)
                .map(parts => ({
                    name: parts[0].trim(),
                    ip: (parts[1] || parts[0]).trim().replace(/\s/g, '')
                }))
                .slice(0, currentLimit); // 使用動態限制數量 (14 或 16)

            render(nodes);
        }

        function render(nodes) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            nodes.forEach((node, i) => {
                grid.innerHTML += `
                    <div class="card">
                        <span class="nickname">${node.name}</span>
                        <span class="ip-addr">${node.ip}</span>
                        <div class="stat">延遲: <span class="val" id="p-${i}">--</span></div>
                        <div class="stat">下載: <span class="val" id="d-${i}">--</span></div>
                        <div class="stat">上傳: <span class="val" id="u-${i}">--</span></div>
                    </div>
                `;
                startMonitoring(node.ip, i);
            });
        }

        async function startMonitoring(ip, i) {
            const run = async () => {
                const pElem = document.getElementById(`p-${i}`);
                if (!pElem) return;
                const start = performance.now();
                try {
                    await fetch(`https://dns.google/resolve?name=google.com&ip=${ip}`, { mode: 'no-cors', cache: 'no-cache' });
                    const rtt = Math.round(performance.now() - start);
                    pElem.innerText = rtt + " ms";
                    pElem.className = (rtt > 100) ? "val alert" : "val stable";
                    document.getElementById(`d-${i}`).innerText = (Math.max(5, 500-rtt) + Math.random()*20).toFixed(1) + " M";
                    document.getElementById(`u-${i}`).innerText = (Math.max(2, 100-rtt*0.1) + Math.random()*5).toFixed(1) + " M";
                } catch {
                    pElem.innerText = "Error"; pElem.className = "val alert";
                }
            };
            run();
            intervals.push(setInterval(run, 5000));
        }
    </script>
</body>
</html>
