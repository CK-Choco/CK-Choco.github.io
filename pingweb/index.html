<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor - Professional Simulation</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --border: #30363d;
            --red: #f85149;
            --green: #3fb950;
            --gold: #d29922;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin-bottom: 20px; }
        #status-msg { font-size: 13px; color: #8b949e; margin-bottom: 15px; }

        .controls { 
            margin-bottom: 25px; 
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            width: 100%;
        }

        .secret-input {
            background: #21262d; border: 1px solid var(--border);
            color: var(--accent); padding: 8px; border-radius: 6px;
            text-align: center; outline: none; width: 140px;
            font-family: monospace; transition: 0.3s;
        }
        .secret-input:focus { border-color: var(--accent); }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-switch {
            background-color: #21262d; border: 1px solid var(--border);
            color: #8b949e; padding: 10px 20px; border-radius: 6px;
            cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .btn-switch.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.1); }

        .grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 15px; width: 100%; max-width: 1200px; 
        }
        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

        .card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 18px; border-radius: 10px; position: relative;
            transition: 0.2s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-2px); }
        
        .nickname { color: #fff; font-weight: bold; font-size: 1.1em; margin-bottom: 4px; display: block; }
        .target-addr { color: var(--accent); font-size: 0.8em; font-family: monospace; opacity: 0.7; word-break: break-all; margin-bottom: 12px; display: block; }
        
        .stat { display: flex; justify-content: space-between; font-size: 0.9em; margin: 8px 0; border-top: 1px solid #21262d; padding-top: 8px; }
        .label { color: #8b949e; }
        .val { color: #fff; font-weight: 500; font-family: 'Consolas', monospace; }
        
        .badge {
            position: absolute; top: 12px; right: 12px;
            font-size: 10px; padding: 2px 6px; border-radius: 4px;
            background: #30363d;
        }
        .badge-doh { background: rgba(210, 153, 34, 0.2); color: var(--gold); border: 1px solid var(--gold); }

        .alert { color: var(--red) !important; }
        .stable { color: var(--green); }
    </style>
</head>
<body>

    <div class="header">
        <h2>網路節點監控儀 (模擬模式)</h2>
        <div id="status-msg">初始化中...</div>
    </div>

    <div class="controls">
        <input type="password" id="pass-code" class="secret-input" placeholder="驗證碼" maxlength="4">
        <div class="btn-group">
            <button class="btn-switch active" onclick="changeSource('iplist.csv', this)">清單 1</button>
            <button class="btn-switch" onclick="changeSource('iplist2.csv', this)">清單 2</button>
            <button class="btn-switch" onclick="changeSource('iplist3.csv', this)">DoH 模式</button>
        </div>
    </div>

    <div id="main-grid" class="grid"></div>

    <script>
        let currentLimit = 14;
        let intervals = [];
        let currentRawData = "";

        window.onload = () => fetchCsv('iplist.csv');

        // 解鎖邏輯
        document.getElementById('pass-code').addEventListener('input', function(e) {
            if (e.target.value === "0909") {
                currentLimit = 16;
                this.style.borderColor = "var(--green)";
                if (currentRawData) parseAndStart(currentRawData);
            }
        });

        async function fetchCsv(url) {
            try {
                const res = await fetch(url);
                currentRawData = await res.text();
                document.getElementById('status-msg').innerText = `正在監控: ${url}`;
                parseAndStart(currentRawData);
            } catch (err) {
                document.getElementById('status-msg').innerText = "讀取失敗";
            }
        }

        function changeSource(name, btn) {
            document.querySelectorAll('.btn-switch').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchCsv(name);
        }

        function parseAndStart(csvText) {
            intervals.forEach(clearInterval);
            intervals = [];
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';

            const lines = csvText.trim().split('\n').slice(1);
            const nodes = lines.map(line => {
                const p = line.split(',');
                const target = (p[1] || p[0]).trim();
                return { name: p[0].trim(), target: target, isDoH: target.startsWith('http') };
            }).slice(0, currentLimit);

            nodes.forEach((node, i) => {
                grid.innerHTML += `
                    <div class="card">
                        <span class="badge ${node.isDoH ? 'badge-doh' : ''}">${node.isDoH ? 'DoH' : 'Real-IP'}</span>
                        <span class="nickname">${node.name}</span>
                        <span class="target-addr">${node.target}</span>
                        <div class="stat"><span class="label">延遲 (RTT)</span><span class="val" id="p-${i}">--</span></div>
                        <div class="stat"><span class="label">上傳速度</span><span class="val" id="u-${i}">--</span></div>
                        <div class="stat"><span class="label">下載速度</span><span class="val" id="d-${i}">--</span></div>
                        <div class="stat"><span class="label">連線狀態</span><span class="val" id="s-${i}">--</span></div>
                    </div>
                `;
                monitorNode(node, i);
            });
        }

        async function monitorNode(node, i) {
            const run = async () => {
                const pElem = document.getElementById(`p-${i}`);
                const uElem = document.getElementById(`u-${i}`);
                const dElem = document.getElementById(`d-${i}`);
                const sElem = document.getElementById(`s-${i}`);
                if (!pElem) return;

                const start = performance.now();
                try {
                    // 發送輕量探針
                    const url = node.isDoH ? `${node.target}?name=google.com` : `https://${node.target}`;
                    await fetch(url, { mode: 'no-cors', cache: 'no-cache' });
                    
                    const rtt = Math.round(performance.now() - start);
                    pElem.innerText = rtt + " ms";
                    pElem.className = rtt > 150 ? "val alert" : "val stable";

                    // --- 模擬邏輯還原 ---
                    // 下載速度隨延遲變化：延遲越低，速度越高
                    const baseDown = Math.max(20, 600 - rtt);
                    const mockDown = (baseDown + Math.random() * 50).toFixed(1);
                    dElem.innerText = mockDown + " Mbps";

                    // 上傳速度模擬
                    const baseUp = Math.max(10, 150 - rtt * 0.2);
                    const mockUp = (baseUp + Math.random() * 10).toFixed(1);
                    uElem.innerText = mockUp + " Mbps";

                    sElem.innerText = "穩定";
                    sElem.className = "val stable";

                } catch (e) {
                    pElem.innerText = "Timeout";
                    pElem.className = "val alert";
                    dElem.innerText = "0.0 Mbps";
                    uElem.innerText = "0.0 Mbps";
                    sElem.innerText = "攔截/離線";
                    sElem.className = "val alert";
                }
            };

            run();
            // 恢復原本較快的更新頻率 (5秒)
            const interval = setInterval(run, 5000);
            intervals.push(interval);
        }
    </script>
</body>
</html>
